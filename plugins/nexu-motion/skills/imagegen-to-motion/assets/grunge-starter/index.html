<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Creative Reset</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="stage">
    <img class="paper-texture" src="assets/paper-texture.jpg" alt="">
    <div class="toner" aria-hidden="true"></div>

    <section class="crush-intro" aria-hidden="true">
      <div class="crush-panel panel-tl"></div>
      <div class="crush-panel panel-tr"></div>
      <div class="crush-panel panel-br"></div>
      <div class="crush-panel panel-bl"></div>
      <div class="crease crease-a"></div>
      <div class="crease crease-b"></div>
      <div class="crease crease-c"></div>
      <div class="crease crease-d"></div>
      <div class="crush-core"></div>
      <i class="fragment frag-1"></i>
      <i class="fragment frag-2"></i>
      <i class="fragment frag-3"></i>
      <i class="fragment frag-4"></i>
      <i class="fragment frag-5"></i>
      <i class="fragment frag-6"></i>
    </section>

    <div class="halftone halftone-left" aria-hidden="true"></div>
    <div class="halftone halftone-right" aria-hidden="true"></div>

    <section class="hero">
      <div class="orange-scrap" aria-hidden="true"></div>
      <img class="poster poster-echo" src="assets/cassette-cutout-900.png" alt="">
      <img class="poster poster-main" src="assets/cassette-cutout-900.png" alt="Posterized cassette recorder and headphones">
      <h1>Creative Reset</h1>
      <div class="title-mark" aria-hidden="true"></div>
    </section>

    <section class="message" aria-label="Pause the noise. Let the idea arrive.">
      <p class="type-line line-one">
        <span class="reserve">Pause the noise.</span>
        <span class="marker" aria-hidden="true"></span>
        <span class="typed-wrap" aria-hidden="true"><span class="typed"></span><i class="caret"></i></span>
      </p>
      <p class="type-line line-two">
        <span class="reserve">Let the idea arrive.</span>
        <span class="marker" aria-hidden="true"></span>
        <span class="typed-wrap" aria-hidden="true"><span class="typed"></span><i class="caret"></i></span>
      </p>
    </section>

    <div class="rip rip-amber" aria-hidden="true"></div>
    <div class="rip rip-ink" aria-hidden="true"></div>
    <div class="flash" aria-hidden="true"></div>
  </main>
  <script src="motion.js"></script>
</body>
</html>
