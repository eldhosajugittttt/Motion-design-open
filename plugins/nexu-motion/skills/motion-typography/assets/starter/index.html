<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Minimal Motion Typography</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="stage">
    <div class="paper" aria-hidden="true"></div>
    <section class="beat beat-less"><span>LESS</span></section>
    <section class="beat beat-text"><span>text.</span></section>
    <section class="beat beat-more"><span>MORE</span></section>
    <section class="beat beat-meaning">
      <span>meaning.</span>
      <i aria-hidden="true"></i>
    </section>
  </main>
  <script src="motion.js"></script>
</body>
</html>
